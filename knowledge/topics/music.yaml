# Topic framing: Music / 音乐 (歌单、演出、乐评、练习)
# Covers listening notes, performance recaps, learning/practice, and fan sharing.

topic: music
display_name: 音乐 / 歌单 / 演出
aliases: [音乐, 歌单, 乐评, 演唱会, 音乐节, livehouse, 乐队, 歌手, 专辑,
          吉他, 钢琴, 唱歌, 编曲, music, playlist, concert, album, band]

audience_intent:
  - 找好听的歌单和相似推荐
  - 看演出/音乐节真实体验
  - 获得情绪共鸣和审美表达
  - 学练习、设备、编曲或创作经验

typical_hooks:
  - "这首歌真的后劲太大"
  - "现场听到这一段直接起鸡皮疙瘩"
  - "如果你最近也有这种情绪，听它"
  - "练了X天终于把这一段弹顺了"

saveability_cues:
  - 歌名、歌手、专辑、版本和平台
  - 歌单场景、情绪标签和排序理由
  - 演出时间、座位/场地、购票和交通经验
  - 练习谱例、设备参数和分步骤方法

credibility_cues:
  - 具体歌词/旋律/编曲细节
  - 真实听感或现场细节
  - 区分个人审美和客观信息
  - 尊重版权和原作者信息

ai_smell_signals:
  - 只有治愈、破防、封神等空泛词
  - 没有具体歌名、段落或听感
  - 乐评像通用作文
  - 未授权搬运音源、视频或图片
