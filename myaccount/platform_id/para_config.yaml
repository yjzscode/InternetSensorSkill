# User Parameters / 用户可调参数
#
# 修改这个文件即可调整 skill 的默认行为。命令行显式传入的参数优先级更高。
# Edit this file to customize defaults. Explicit CLI flags still win.

retrieval:
  # Provider selection: auto | bilibili | cdp | searxng | tavily | exa | firecrawl | crawl4ai
  provider: auto

  # Web/search retrieval size.
  limit: 30              # 搜索候选结果数
  crawl: true            # 是否抓取结果页补充互动量/发布时间
  rank: true             # 是否按真实传播力排序
  top: 8                 # 保存到 trends.json 的 top N；0 表示不截断
  min_vibe: null         # 低于该真实 vibe_score 的样本丢弃；null 表示不启用

  # Reference examples saved for rewrite.
  examples_n: 5          # 保存到 reference_examples.json 的样本数
  prefer_scored_examples: true

  # Priority account search.
  reference_accounts:
    enabled: true
    path: reference_accounts.md
    min_results_before_fallback: 5

source_links:
  # 用户原文里自带 URL/PDF 时，用作事实来源，不是爆款参考。
  enabled: true
  max_urls: 5
  max_chars_per_source: 12000
  timeout_seconds: 30
  require_source_grounding_for_urls: true

real_vibe_score:
  # 用于检索到的真实帖子传播力评分：vibe_score。
  # Supported formula: log_normalized_per_day | linear_per_day
  formula: log_normalized_per_day
  max_score: 100
  min_score: 0
  round_digits: 1
  baseline_per_day: 5000.0
  default_age_days: 30
  engagement_weights:
    likes: 1.0
    comments: 2.0
    saves: 3.0
    shares: 4.0
    views: 0.01

predicted_vibe_index:
  # 由 Claude 在 prompts/critique_content.md 中执行，用于评价用户原文。
  formula: weighted_positive_mean_with_ai_penalty
  positive_dimensions:
    hook_strength: 1.0
    novelty: 1.0
    authenticity: 1.0
    shareability: 1.0
    saveability: 1.0
    platform_fit: 1.0
  ai_smell:
    enabled: true
    penalty_divisor: 20.0
  scale: 10.0
  round_digits: 0
  max_score: 100
  min_score: 0

account_consistency:
  # 由 Claude 在 prompts/account_consistency.md 中执行，只评价“改写后”的内容。
  formula: weighted_mean_with_penalty_and_caps
  dimensions:
    target_audience_fit: 1.4
    domain_fit: 1.6
    content_pillar_fit: 1.2
    value_promise_fit: 1.2
    voice_style_fit: 1.3
    perspective_fit: 1.0
    reference_account_alignment: 0.8
    platform_format_fit: 0.7
  penalties:
    off_domain_topic: 15
    wrong_audience: 12
    style_conflict: 10
    over_imitation: 10
    brand_risk: 15
  caps:
    domain_fit_lte_4: 65
    target_audience_fit_lte_4: 70
    severe_brand_risk: 60
  round_digits: 0
  max_score: 100
  min_score: 0

risk_audit:
  # 由 Claude 在 prompts/final_risk_audit.md 中执行，不做法律判断，只做发布风险提醒。
  enabled: true
  require_user_confirmation_for:
    - 数据/比例/金额/价格/时间/排名
    - 亲身经历/案例/客户结果
    - 医学/法律/投资/教育升学等高风险判断
    - 功效承诺/收益承诺/绝对化表述
    - 原文没有提供、但改写中新出现的具体事实
  platform_sensitive_topics:
    common:
      - 医疗健康
      - 金融投资
      - 法律建议
      - 夸大功效
      - 搬运/洗稿
      - 引战/人身攻击
      - 未授权图片/素材
    weixin:
      - 标题党诱导分享
      - 医疗金融绝对化判断
    zhihu:
      - 缺少来源的专业判断
      - 编造经历或案例
    linkedin:
      - 夸大职业成就
      - 未证实商业数据

learning_report:
  # learning-report 模式使用：每个参考账号抓取/保存的候选内容数。
  items_per_account: 5
  limit_per_account: 20
  crawl: true
  rank: true

account_reference_samples:
  # 主改写 pipeline 使用：从 myaccount/reference_accounts.md 抓取账号风格样本。
  enabled: true
  items_per_account: 3
  limit_per_account: 20
  crawl: true
  rank: true
  use_as_style_guardrail: true

output:
  timestamp_format: "%Y%m%d-%H%M%S"
  files:
    testcase: testcase.md
    trends: trends.json
    reference_examples: reference_examples.json
    account_reference_examples: account_reference_examples.json
    critique: critique.json
    rewrite: rewrite.md
    source_links: source_links.json
    account_consistency: account_consistency.json
    risk_audit: risk_audit.json
    learning_raw: learning_raw.json
    learning_report: learning_report.md
